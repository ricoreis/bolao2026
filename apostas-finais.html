<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão 2026 - Mata-Mata</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="auth-header.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; font-weight: 500; }
        h1,h2,h3 { font-family: 'Quicksand', sans-serif; font-weight: 300; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <nav class="bg-gray-800 border-b border-gray-700 px-6 h-24 flex flex-col sm:flex-row justify-between items-center gap-4 fixed top-0 left-0 w-full z-50">
        <div class="w-full sm:w-auto text-center sm:text-left">
            <div class="w-full sm:w-auto text-center sm:text-left">
                <h1 class="text-xl font-bold tracking-wide text-emerald-400">BOLÃO 2026</h1>
            </div>
        </div>

        <div class="flex flex-wrap items-center justify-center gap-2 p-1">
            <div class="hidden group relative flex items-center justify-center">
                <button onclick="window.location.href='dashboard.html'" class="cursor-pointer hover:text-white text-sm font-medium px-3 py-2 rounded-full transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="material-symbols:dashboard-rounded"></iconify-icon>
                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Dashboard
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <button onclick="window.location.href='ranking.html'"  class="cursor-pointer text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-full transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="material-symbols:trophy"></iconify-icon>
                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Ranking
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <button onclick="window.location.href='apostas-grupos.html'" class="cursor-pointer text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-full transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="lucide-lab:soccer-pitch"></iconify-icon>
                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Jogos
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <button class="bg-emerald-600 text-white text-sm font-medium px-3 py-2 rounded-full transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="mdi:bracket"></iconify-icon>
                </button>
                <!-- <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Mata-Mata
                </span> -->
            </div>
            <div class="group relative flex items-center justify-center">
                <button onclick="window.location.href='palpites.html'" class="cursor-pointer text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-full transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="hugeicons:quiz-02"></iconify-icon>
                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Palpites
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <button onclick="window.location.href='grupos.html'" class="cursor-pointer hover:text-white text-sm font-medium px-3 py-2 rounded-full transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="mynaui:list-number"></iconify-icon>
                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Classificação
                </span>
            </div>
        </div>

        <div class="flex gap-3 items-center">
            <p id="saudacao-user" class="text-xs text-gray-400 mt-1 italic">Carregando...</p>
            <button id="btn-logout" class="bg-gray-700 hover:bg-red-600 text-white text-sm font-medium px-4 py-2 rounded-lg w-full sm:w-auto transition">
                Sair
            </button>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-8 space-y-6 pt-28">

        <h2 class="text-2xl uppercase font-semibold text-gray-300 pb-2 text-center">Fase Mata-Mata</h2>

        <div class="space-y-6">

            <div id="container-jogos" class="space-y-6">
                <p class="text-gray-500 animate-pulse text-center py-8">Buscando chaveamento eliminatório...</p>
            </div>

        </div>

    </main>

    <template id="template-jogo">
        <div class="card-jogo bg-gray-800 border border-gray-700 rounded-xl p-4 flex flex-col gap-3">
            
            <!-- Linha Superior: Data + Número FIFA de referência -->
            <div class="flex justify-between items-center border-b border-gray-700/50 pb-2">
                <span class="data-jogo text-xs font-mono text-gray-500"></span>
                <span class="jogo-fifa-badge bg-gray-900 border border-gray-700 text-gray-400 font-mono text-[10px] px-2 py-0.5 rounded-md font-bold"></span>
            </div>

            <!-- Linha Central: Times e Inputs -->
            <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-3">
                <div class="flex items-center gap-2">
                    <span class="time-a font-bold text-white"></span>
                    <span class="sigla-a text-xs text-gray-500 font-bold"></span>
                    <span class="text-gray-600 font-bold px-1">VS</span>
                    <span class="time-b font-bold text-white"></span>
                    <span class="sigla-b text-xs text-gray-500 font-bold"></span>
                </div>
                
                <div class="flex items-center justify-end gap-2">
                    <input type="number" min="0" class="input-a w-12 h-10 bg-gray-900 border border-gray-700 text-center rounded-lg font-bold text-lg text-emerald-400 focus:outline-none focus:border-emerald-500">
                    <span class="text-gray-600 font-bold">x</span>
                    <input type="number" min="0" class="input-b w-12 h-10 bg-gray-900 border border-gray-700 text-center rounded-lg font-bold text-lg text-emerald-400 focus:outline-none focus:border-emerald-500">
                    <button class="btn-salvar ml-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2 rounded-lg transition text-sm">Salvar</button>
                </div>
            </div>

            <div class="container-penaltis bg-gray-900/60 border border-amber-500/20 rounded-lg p-3 hidden">
                <span class="text-[11px] text-amber-400 font-medium block mb-2">
                    <iconify-icon icon="lucide:info"></iconify-icon> Empate! Quem vence nos pênaltis?
                </span>
                <div class="flex gap-4">
                    <!-- Envolvido em label -->
                    <label class="flex items-center gap-2 cursor-pointer text-sm">
                        <input type="radio" value="time_a_id" class="radio-penaltis-a">
                        <span class="nome-time-a">Time A</span>
                    </label>
                    
                    <label class="flex items-center gap-2 cursor-pointer text-sm">
                        <input type="radio" value="time_b_id" class="radio-penaltis-b">
                        <span class="nome-time-b">Time B</span>
                    </label>
                </div>
            </div>

            <!-- Badge de Status Inferior -->
            <div class="status-badge bg-gray-900 text-gray-500 text-[10px] px-2 py-1 rounded w-fit">
                Aguardando definição de chaves
            </div>
        </div>
    </template>

    <div id="toast" class="fixed bottom-5 right-5 text-white px-5 py-3 rounded-lg shadow-xl font-medium translate-y-20 opacity-0 transition-all duration-300"></div>
    <script src="regras.js"></script>
    <script src="apostas.js"></script>
</body>
</html>

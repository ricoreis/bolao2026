<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão 2026 - Grupos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 fixed top-0 left-0 w-full z-50">
        <div class="w-full sm:w-auto text-center sm:text-left">
            <h1 class="text-xl font-bold tracking-wide text-emerald-400">BOLÃO 2026</h1>
            <p id="saudacao-user" class="text-xs text-gray-400 mt-1">Carregando perfil...</p>
        </div>

        <div class="flex flex-wrap items-center justify-center gap-2 bg-gray-900/50 p-1 rounded-xl border border-gray-700">
            <div class="hidden group relative flex items-center justify-center">
                <a href="dashboard.html" class="text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-lg transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="material-symbols:dashboard-rounded"></iconify-icon>
                </a>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Dashboard
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <a href="ranking.html" class="text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-lg transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="material-symbols:trophy"></iconify-icon>
                </a>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Ranking
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <a href="apostas-grupos.html" class="bg-emerald-600 text-white text-sm font-medium px-3 py-2 rounded-lg transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="proicons:soccer"></iconify-icon>
                </a>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Jogos
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <a href="apostas-finais.html" class="text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-lg transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="mdi:bracket"></iconify-icon>
                </a>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Mata-Mata
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <a href="palpites.html" class="text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-lg transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="hugeicons:quiz-02"></iconify-icon>
                </a>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Palpites
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <a href="grupos.html" class="text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-lg transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="mynaui:list-number"></iconify-icon>
                </a>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Classificação
                </span>
            </div>
        </div>

        <button id="btn-logout" class="bg-gray-700 hover:bg-red-600 text-white text-sm font-medium px-4 py-2 rounded-lg w-full sm:w-auto transition">
            Sair
        </button>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-8 space-y-6 pt-28">

        <h2 class="text-2xl uppercase font-semibold text-gray-300 pb-2 text-center">Fase de Grupos</h2>

        <div class="space-y-6">

            <div id="container-jogos" class="space-y-4">
                <p class="text-gray-500 animate-pulse text-center py-8">Buscando partidas do banco...</p>
            </div>

        </div>

    </main>

    <template id="template-jogo">
        <div class="card-jogo bg-gray-800 border border-gray-700 rounded-xl p-4 flex flex-col gap-2">
            <span class="data-jogo text-xs font-mono text-gray-500"></span>
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span class="time-a font-bold text-white"></span>
                    <span class="sigla-a text-xs text-gray-500 font-bold"></span>
                    <span class="text-gray-600 font-bold px-2">VS</span>
                    <span class="time-b font-bold text-white"></span>
                    <span class="sigla-b text-xs text-gray-500 font-bold"></span>
                </div>
                <div class="flex items-center gap-2">
                    <input type="number" class="input-a w-12 h-10 bg-gray-900 border border-gray-700 text-center rounded-lg font-bold text-lg text-emerald-400 focus:outline-none focus:border-emerald-500">
                    <span class="text-gray-600 font-bold">x</span>
                    <input type="number" class="input-b w-12 h-10 bg-gray-900 border border-gray-700 text-center rounded-lg font-bold text-lg text-emerald-400 focus:outline-none focus:border-emerald-500">
                    <button class="btn-salvar ml-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2 rounded-lg transition">Salvar</button>
                </div>
            </div>
            <div class="status-badge bg-gray-900 text-gray-500 text-[10px] px-2 py-1 rounded w-fit">
                Aguardando partida
            </div>
        </div>
    </template>

    <div id="toast" class="fixed bottom-5 right-5 text-white px-5 py-3 rounded-lg shadow-xl font-medium translate-y-20 opacity-0 transition-all duration-300"></div>
    <script src="regras.js"></script>
    <script src="apostas.js"></script>
</body>
</html>

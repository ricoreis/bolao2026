<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão 2026 - Palpites</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 fixed top-0 left-0 w-full z-50">
        <div class="w-full sm:w-auto text-center sm:text-left">
            <h1 class="text-xl font-bold tracking-wide text-emerald-400">BOLÃO 2026</h1>
            <p id="saudacao-user" class="text-xs text-gray-400 mt-1">Carregando perfil...</p>
        </div>

        <div class="flex flex-wrap items-center justify-center gap-2 bg-gray-900/50 p-1 rounded-xl border border-gray-700">
            <a href="dashboard.html" class="text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-lg transition">Início</a>
            <a href="apostas-grupos.html" class="text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-lg transition">Grupos</a>
            <a href="apostas-finais.html" class="text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-lg transition">Mata-Mata</a>
            <a href="palpites.html" class="bg-emerald-600 text-white text-sm font-medium px-3 py-2 rounded-lg transition">Palpites</a>
            <a href="grupos.html" class="text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-lg transition">Classificação</a>
            <a href="ranking.html" class="text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-lg transition">Ranking</a>
        </div>
        <button id="btn-logout" class="bg-gray-700 hover:bg-red-600 text-white text-sm font-medium px-4 py-2 rounded-lg w-full sm:w-auto transition">
            Sair
        </button>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-8 space-y-6 pb-24 pt-28">
        
        <h2 class="text-2xl uppercase font-semibold text-gray-300 pb-2 text-center">Palpites Extras</h2>
        
        <div class="space-y-6">
            <!-- Seleção Brasileira -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h3 class="text-emerald-400 font-bold mb-4">Seleção Brasileira</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-gray-400">Primeiro Gol do Brasil</label>
                        <select id="sel-gol" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                        <span id="pts-gol-brasil" class="block text-[10px] font-bold text-emerald-400 mt-1"></span>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Brasil chega até...</label>
                        <select id="sel-fase" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                        <span id="pts-fase-brasil" class="block text-[10px] font-bold text-emerald-400 mt-1"></span>
                    </div>

                    <div>
                        <label class="text-xs text-gray-400">Gols do Brasil</label>
                        <input type="number" id="inp-gols-pro" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1 text-white">
                        <!-- Adicione esta linha -->
                        <span id="pts-gols-pro" class="block text-[10px] font-bold text-blue-400 mt-1"></span>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Gols sofridos pelo Brasil</label>
                        <input type="number" id="inp-gols-contra" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1 text-white">
                        <!-- Adicione esta linha -->
                        <span id="pts-gols-contra" class="block text-[10px] font-bold text-blue-400 mt-1"></span>
                    </div>
                </div>
            </div>
            
            <!-- Pódios -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h3 class="text-emerald-400 font-bold mb-4">Podium</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-gray-400">Campeão</label>
                        <select id="sel-campeao" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                        <span id="pts-campeao" class="block text-[10px] font-bold text-amber-400 mt-1"></span>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Vice-Campeão</label>
                        <select id="sel-vice" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                        <span id="pts-vice" class="block text-[10px] font-bold text-amber-400 mt-1"></span>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">3º Lugar</label>
                        <select id="sel-terceiro" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                        <span id="pts-terceiro" class="block text-[10px] font-bold text-amber-400 mt-1"></span>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">4º Lugar</label>
                        <select id="sel-quarto" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                        <span id="pts-quarto" class="block text-[10px] font-bold text-amber-400 mt-1"></span>
                    </div>
                </div>

                <div id="box-bonus" class="bg-gray-800 p-4 rounded-xl border border-emerald-500/30 mt-6 space-y-2">
                    <div id="lista-bonus" class="text-xs text-gray-300 space-y-1"></div>
                </div>
            </div>

            <!-- Extras -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h3 class="text-emerald-400 font-bold mb-4">Outros Palpites</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-gray-400">Pior time da Copa</label>
                        <select id="sel-pior" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                        <span id="pts-pior" class="block text-[10px] font-bold text-blue-400 mt-1"></span>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">País do Artilheiro</label>
                        <select id="sel-artilheiro-pais" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                        <span id="pts-artilheiro" class="block text-[10px] font-bold text-blue-400 mt-1"></span>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Quem participará mais com gols + assistências?</label>
                        <select id="sel-cr7-messi" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1 text-white">
                            <option value="">Selecione...</option>
                            <option value="CR7">Cristiano Ronaldo</option>
                            <option value="MESSI">Lionel Messi</option>
                            <option value="EMPATE">Empate</option>
                        </select>
                        <!-- O span precisa estar aqui! -->
                        <span id="pts-cr7-messi" class="block text-[10px] font-bold text-blue-400 mt-1"></span>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Total de Gols pelas Apostas</label>
                        <input type="number" id="inp-total-gols" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1 text-white">
                        <span id="pts-total-gols" class="block text-[10px] font-bold text-blue-400 mt-1"></span>
                    </div>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 w-full p-4 bg-gray-900 border-t border-gray-700 shadow-[0_-5px_15px_rgba(0,0,0,0.3)] z-50">
                <div class="max-w-3xl mx-auto">
                    <button id="btn-salvar-palpites" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition shadow-lg">
                        Salvar Todos os Palpites
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 text-white px-5 py-3 rounded-lg shadow-xl font-medium translate-y-20 opacity-0 transition-all duration-300"></div>

    <script type="module" src="palpites.js"></script>
</body>
</html>

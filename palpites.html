<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão 2026 - Palpites</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-xl font-bold tracking-wide text-emerald-400">BOLÃO 2026</h1>
            <p id="saudacao-user" class="text-xs text-gray-400 mt-1">Carregando perfil...</p>
        </div>
        <div class="flex items-center gap-2 bg-gray-900/50 p-1 rounded-xl border border-gray-700">
            <a href="apostas.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Apostas</a>
            <a href="palpites.html" class="bg-emerald-600 text-white text-sm font-medium px-4 py-2 rounded-lg">Palpites</a>
            <a href="grupos.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Grupos</a>
            <a href="ranking.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Ranking</a>
        </div>
        <button id="btn-logout" class="bg-gray-700 hover:bg-red-600 text-white text-sm font-medium px-4 py-2 rounded-lg w-full sm:w-auto">Sair</button>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-8 space-y-6">
        <h2 class="text-lg font-semibold text-gray-300 border-b border-gray-700 pb-2">🎯 Palpites de Longo Prazo</h2>
        
        <div class="space-y-6">
            <!-- Seleção Brasileira -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h3 class="text-emerald-400 font-bold mb-4">🇧🇷 Seleção Brasileira</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-gray-400">1º Gol do Brasil</label>
                        <select id="sel-gol" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Fase que o Brasil para</label>
                        <select id="sel-fase" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                    </div>
                </div>
            </div>
            
            <!-- Pódios -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h3 class="text-amber-400 font-bold mb-4">🏆 Pódios da Copa</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-gray-400">Campeão</label>
                        <select id="sel-campeao" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Vice-Campeão</label>
                        <select id="sel-vice" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">3º Lugar</label>
                        <select id="sel-terceiro" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">4º Lugar</label>
                        <select id="sel-quarto" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                    </div>
                </div>
            </div>

            <!-- Extras -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h3 class="text-blue-400 font-bold mb-4">📊 Outros Palpites</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-gray-400">Pior time do torneio</label>
                        <select id="sel-pior" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">País do Artilheiro</label>
                        <select id="sel-artilheiro-pais" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                    </div>
                </div>
            </div>
            
            <!-- Estatísticas -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h3 class="text-purple-400 font-bold mb-4">📊 Detalhes do Brasil</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-gray-400">Gols que o Brasil faz</label>
                        <input type="number" id="inp-gols-pro" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1 text-white">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Gols que o Brasil leva</label>
                        <input type="number" id="inp-gols-contra" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1 text-white">
                    </div>
                </div>
            </div>

            <!-- Final da Copa -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h3 class="text-rose-400 font-bold mb-4">🌍 Final da Copa</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-gray-400">Finalista 1</label>
                        <select id="sel-finalista-1" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Finalista 2</label>
                        <select id="sel-finalista-2" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 mt-1"></select>
                    </div>
                </div>
            </div>

            <button id="btn-salvar-palpites" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition">
                Salvar Todos os Palpites
            </button>
        </div>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 text-white px-5 py-3 rounded-lg shadow-xl font-medium translate-y-20 opacity-0 transition-all duration-300"></div>

    <script src="palpites.js"></script>
</body>
</html>

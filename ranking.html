        .scroll-custom::-webkit-scrollbar { width: 20px; height: 20px; }

            animation: pulso 2s ease-in-out infinite;

        <div class="flex flex-wrap items-center justify-center gap-1 md:gap-3 p-1">

            <div class="group relative flex items-center justify-center">

                </span>

                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Palpites
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <button onclick="window.location.href='grupos.html'" class="cursor-pointer hover:text-white text-sm font-medium px-3 py-2 rounded-full transition size-10 md:size-12 flex items-center justify-center">
                    <iconify-icon class="text-2xl md:text-3xl" icon="mynaui:list-number"></iconify-icon>

    <main class="max-w-none pt-36 md:pt-36 md:px-12 md:pb-12 h-full">
        <div id="participantes" class="flex p-12 hidden">
            <div id="container-participantes" class="grid grid-cols-3 w-full gap-6"></div>
        </div>
        <div class="flex h-full">
            <div class="opacity-100 bg-gray-800 border border-gray-700 overflow-x-auto scroll-custom shadow-2xl w-full md:rounded-xl">
                <table class="w-full text-left border-collapse min-w-[1000px]">
                        <thead class="sticky top-0 z-30 text-xs text-emerald-800 uppercase bg-gray-700">
                            <tr class="border-b border-gray-700">
                                <th class="sticky min-w-[40px] max-w-[40px] w-[40px] left-0 md:min-w-[50px] md:max-w-[50px] md:w-[50px] md:left-0 z-20 bg-gray-700 text-emerald-400 px-1 md:px-4 text-center py-4 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.5)] col-posicao"></th>
                                <th class="sticky min-w-[100px] max-w-[100px] w-[100px] left-[40px] md:min-w-[150px] md:max-w-[150px] md:w-[150px] md:left-[50px] z-20 bg-gray-700 text-emerald-400 px-1 md:px-4 py-4 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.5)] text-[10px] md:text-xs">Participantes</th>
                                <th class="sticky min-w-[60px] max-w-[60px] w-[60px] left-[140px] md:min-w-[100px] md:max-w-[100px] md:w-[100px] md:left-[200px] z-20 bg-gray-700 text-emerald-400 px-1 md:px-4 py-4 text-center shadow-[2px_0_5px_-2px_rgba(0,0,0,0.5)] col-pontuacao">Pts</th>
                            </tr>
                        </thead>
                        <tbody id="container-ranking" class="divide-y divide-gray-700/50 text-sm">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <template id="template-participante">
        <div class="p-12 bg-gray-800 rounded-xl flex items-center justify-center border border-gray-700">
            <span class="participante-icone text-2xl"></span>
            <span class="participante-nome uppercase text-2xl"></span>
        </div>
    </template>

    <div id="loader" class="fixed inset-0 flex items-center justify-center bg-gray-900 z-30">
        <div class="flex flex-col items-center">
            <div class="meu-pulso-lento">
                <iconify-icon class="text-6xl text-emerald-500" icon="material-symbols:trophy"></iconify-icon>
            </div>
            <p class="text-emerald-500 mt-4 font-bold tracking-widest uppercase">Carregando Ranking...</p>
        </div>
    </div>

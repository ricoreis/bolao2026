<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão 2026 - Ranking</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Faz a sombra do sticky aparecer só quando rolar */
        th.sticky { background-color: #1f2937; } /* bg-gray-800 */
        tbody tr:hover { background-color: rgba(255, 255, 255, 0.03); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-xl font-bold tracking-wide text-emerald-400">BOLÃO 2026</h1>
            <p id="saudacao-user" class="text-xs text-gray-400 mt-1">Carregando perfil...</p>
        </div>
        <div class="flex items-center gap-2 bg-gray-900/50 p-1 rounded-xl border border-gray-700">
            <a href="dashboard.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Início</a>
            <a href="apostas-grupos.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Grupos</a>
            <a href="apostas-finais.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Mata-Mata</a>
            <a href="palpites.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Palpites</a>
            <a href="grupos.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Classificação</a>
            <a href="ranking.html" class="bg-emerald-600 text-white text-sm font-medium px-4 py-2 rounded-lg">Ranking</a>
        </div>
        <button id="btn-logout" class="bg-gray-700 hover:bg-red-600 text-white text-sm font-medium px-4 py-2 rounded-lg w-full sm:w-auto">Sair</button>
    </nav>

    <main class="max-w-none px-4 py-8 space-y-6">
        <h2 class="text-2xl uppercase font-semibold pb-2 text-gray-300 text-center">Ranking</h2>

        <!-- Container com scroll horizontal -->
        <div class="bg-gray-800 border border-gray-700 rounded-xl overflow-x-auto shadow-2xl">
            <table class="w-full text-left border-collapse min-w-[1000px]"> <!-- min-w garante espaço p/ as colunas -->
                <thead class="text-xs text-emerald-400 uppercase bg-gray-800">
                    <tr class="border-b border-gray-700">
                        <th class="sticky left-0 bg-gray-800 z-20 px-4 py-4 w-16 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.5)]">Pos</th>
                        <th class="sticky left-16 bg-gray-800 z-20 px-4 py-4 min-w-[180px] shadow-[2px_0_5px_-2px_rgba(0,0,0,0.5)]">Participante</th>
                        <th class="sticky left-[244px] bg-gray-800 z-20 px-4 py-4 text-right shadow-[2px_0_5px_-2px_rgba(0,0,0,0.5)]">Pts</th>
                        
                        </tr>
                </thead>
                <tbody id="container-ranking" class="divide-y divide-gray-700/50 text-sm">
                    <!-- Linhas populadas via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Script Isolado -->
    <script src="regras.js"></script>
    <script type="module" src="ranking.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão 2026 - Ranking</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-xl font-bold tracking-wide text-emerald-400">BOLÃO 2026</h1>
            <p id="saudacao-user" class="text-xs text-gray-400 mt-1">Carregando perfil...</p>
        </div>
        <div class="flex items-center gap-2 bg-gray-900/50 p-1 rounded-xl border border-gray-700">
            <a href="dashboard.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Início</a>
            <a href="apostas-grupos.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Jogos Grupos</a>
            <a href="apostas-finais.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Jogos Mata-Mata</a>
            <a href="palpites.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Palpites</a>
            <a href="grupos.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Classificação nos Grupos</a>
            <a href="ranking.html" class="bg-emerald-600 text-white text-sm font-medium px-4 py-2 rounded-lg">Ranking</a>
        </div>
        <button id="btn-logout" class="bg-gray-700 hover:bg-red-600 text-white text-sm font-medium px-4 py-2 rounded-lg w-full sm:w-auto">Sair</button>
    </nav>

    <main class="max-w-2xl mx-auto px-4 py-8 space-y-6">
        <h2 class="text-lg font-semibold border-b border-gray-700 pb-2 text-gray-300">📊 Classificação Dos Amigos</h2>

        <div class="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden p-4 shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-gray-700 text-xs text-gray-400 uppercase">
                        <th class="pb-3 w-16 text-center">Posição</th>
                        <th class="pb-3">Participante</th>
                        <th class="pb-3 text-right">Pontos Totais</th>
                    </tr>
                </thead>
                <tbody id="container-ranking" class="divide-y divide-gray-700/50 text-base">
                    <tr>
                        <td colspan="3" class="py-8 text-center text-gray-500 animate-pulse">Carregando classificação...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Script Isolado -->
    <script src="regras.js"></script>
    <script src="ranking.js"></script>
</body>
</html>

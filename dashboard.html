<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão 2026 - Painel</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <!-- NAV BAR -->
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold tracking-wide text-emerald-400">🏆 BOLÃO 2026</h1>
            <p id="saudacao-user" class="text-xs text-gray-400 mt-1">Carregando perfil...</p>
        </div>
        <button id="btn-logout" class="bg-gray-700 hover:bg-red-600 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors cursor-pointer">
            Sair
        </button>
    </nav>

    <!-- CONTAINER PRINCIPAL (Grid de 2 Colunas no Desktop) -->
    <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- COLUNA 1 & 2: LISTA DE JOGOS (Ocupa 2/3 no desktop) -->
        <section class="lg:col-span-2 space-y-6">
            <h2 class="text-lg font-semibold border-b border-gray-700 pb-2 text-gray-300">⚽ Seus Palpites</h2>
            
            <!-- Feed de Jogos Dinâmico -->
            <div id="container-jogos" class="space-y-4">
                <p class="text-gray-500 animate-pulse">Buscando partidas do banco...</p>
            </div>
        </section>

        <!-- COLUNA 3: RANKING GERAL (Ocupa 1/3 no desktop) -->
        <section class="space-y-6">
            <h2 class="text-lg font-semibold border-b border-gray-700 pb-2 text-gray-300">📊 Ranking Geral</h2>
            
            <div class="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden p-4">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-700 text-xs text-gray-400 uppercase">
                            <th class="pb-3 w-12 text-center">Pos</th>
                            <th class="pb-3">Participante</th>
                            <th class="pb-3 text-right">Pts</th>
                        </tr>
                    </thead>
                    <tbody id="container-ranking" class="divide-y divide-gray-700/50 text-sm">
                        <tr>
                            <td colspan="3" class="pt-4 text-center text-gray-500">Carregando classificação...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <!-- NOTIFICAÇÃO FLUTUANTE (FEEDBACK VISUAL TOAST) -->
    <div id="toast" class="fixed bottom-5 right-5 bg-emerald-600 text-white px-5 py-3 rounded-lg shadow-xl font-medium translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        Palpite salvo com sucesso!
    </div>

    <!-- SCRIPT DE INTEGRAÇÃO DO BOLÃO -->
    <script>
        // CONFIGURAÇÃO DO SUPABASE (O cliente reaproveita as chaves do seu index.html)
        const SUPABASE_URL = "https://rximgiwpqmshqaducvla.supabase.co"; 
        const SUPABASE_ANON_KEY = "SUA_ANON_KEY_AQUI"; // << COLE SUA SUPABASE_ANON_KEY AQUI
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let usuarioLogadoId = null;

        // ELEMENTOS DA TELA
        const saudacaoUser = document.getElementById('saudacao-user');
        const btnLogout = document.getElementById('btn-logout');
        const containerJogos = document.getElementById('container-jogos');
        const containerRanking = document.getElementById('container-ranking');
        const toast = document.getElementById('toast');

        // 1. VERIFICA AUTENTICAÇÃO E SESSÃO ATIVA
        async function verificarSessao() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            
            if (!session) {
                // Se não estiver logado, chuta de volta para a tela de login
                window.location.href = "index.html";
                return;
            }

            usuarioLogadoId = session.user.id;
            
            // Busca o nome amigável do usuário na tabela pública
            const { data: userData } = await supabaseClient
                .from('usuarios')
                .select('nome')
                .eq('id', usuarioLogadoId)
                .single();

            if (userData) {
                saudacaoUser.innerText = `Boa sorte nas apostas, ${userData.nome}!`;
            }

            // Inicia a renderização dos dados do Bolão
            carregarDadosDoBolao();
        }

        // 2. EXIBE TOAST DE CONFIRMAÇÃO VISUAL (UX)
        function showToast(mensagem, isError = false) {
            toast.innerText = mensagem;
            toast.className = `fixed bottom-5 right-5 text-white px-5 py-3 rounded-lg shadow-xl font-medium translate-y-0 opacity-100 transition-all duration-300 pointer-events-none ${isError ? 'bg-red-600' : 'bg-emerald-600'}`;
            
            setTimeout(() => {
                toast.className = "fixed bottom-5 right-5 text-white px-5 py-3 rounded-lg shadow-xl font-medium translate-y-20 opacity-0 transition-all duration-300 pointer-events-none";
            }, 3000);
        }

        // 3. CARREGA JOGOS, PALPITES E RANKING SIMULTANEAMENTE
        async function carregarDadosDoBolao() {
            try {
                // Busca Jogos e Palpites existentes em paralelo
                const [jogosRes, palpitesRes, rankingRes] = await Promise.all([
                    supabaseClient.from('jogos').select('*').order('data_jogo', { ascending: true }),
                    supabaseClient.from('palpites').select('*').eq('usuario_id', usuarioLogadoId),
                    supabaseClient.from('usuarios').select('nome', 'pontos_totais').order('pontos_totais', { ascending: false })
                ]);

                if (jogosRes.error) throw jogosRes.error;
                if (palpitesRes.error) throw palpitesRes.error;
                if (rankingRes.error) throw rankingRes.error;

                const jogos = jogosRes.data;
                const palpites = palpitesRes.data;
                const ranking = rankingRes.data;

                // Monta um mapa de palpites indexado por jogo_id para busca rápida
                const mapaPalpites = {};
                palpites.forEach(p => {
                    mapaPalpites[p.jogo_id] = p;
                });

                // RENDERIZA OS JOGOS
                renderizarJogos(jogos, mapaPalpites);

                // RENDERIZA O RANKING GERAL
                renderizarRanking(ranking);

            } catch (err) {
                console.error("Erro ao carregar dados do painel:", err.message);
                containerJogos.innerHTML = `<p class="text-red-400">Erro ao sincronizar informações.</p>`;
            }
        }

        // 4. MONTA OS CARDS DE JOGOS NO HTML
        function renderizarJogos(jogos, mapaPalpites) {
            if (jogos.length === 0) {
                containerJogos.innerHTML = `<p class="text-gray-500 italic">Nenhum jogo cadastrado pelo administrador ainda.</p>`;
                return;
            }

            containerJogos.innerHTML = "";

            jogos.forEach(jogo => {
                const palpiteExistente = mapaPalpites[jogo.id];
                const golAVal = palpiteExistente ? palpiteExistente.palpite_gols_a : "";
                const golBVal = palpiteExistente ? palpiteExistente.palpite_gols_b : "";

                // Formatação legível da data
                const dataFormatada = new Date(jogo.data_jogo).toLocaleDateString('pt-BR', {
                    day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                });

                const cardHtml = `
                    <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                        
                        <!-- Info do Jogo -->
                        <div class="text-center sm:text-left">
                            <span class="text-xs font-mono text-gray-500">${dataFormatada}</span>
                            <div class="flex items-center gap-3 mt-1 justify-center sm:justify-start">
                                <span class="font-semibold text-base">${jogo.time_a}</span>
                                <span class="text-xs text-gray-500 font-bold">VS</span>
                                <span class="font-semibold text-base">${jogo.time_b}</span>
                            </div>
                            ${jogo.gols_a !== null && jogo.gols_b !== null ? 
                                `<span class="inline-block mt-1 text-xs bg-gray-700 text-amber-400 px-2 py-0.5 rounded font-mono">Placar Real: ${jogo.gols_a} x ${jogo.gols_b}</span>` : 
                                `<span class="inline-block mt-1 text-xs bg-gray-900 text-gray-500 px-2 py-0.5 rounded">Aguardando partida</span>`
                            }
                        </div>

                        <!-- Inputs de Palpite e Ação -->
                        <div class="flex items-center gap-2">
                            <input type="number" id="input-a-${jogo.id}" min="0" value="${golAVal}" placeholder="0" 
                                class="w-12 h-10 bg-gray-900 border border-gray-700 text-center rounded-lg font-bold text-lg text-emerald-400 focus:outline-none focus:border-emerald-500 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                            
                            <span class="text-gray-600 font-bold">x</span>
                            
                            <input type="number" id="input-b-${jogo.id}" min="0" value="${golBVal}" placeholder="0" 
                                class="w-12 h-10 bg-gray-900 border border-gray-700 text-center rounded-lg font-bold text-lg text-emerald-400 focus:outline-none focus:border-emerald-500 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                            
                            <button onclick="salvarPalpite(${jogo.id})" 
                                class="ml-2 bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-medium text-xs px-3 py-2.5 rounded-lg transition-all cursor-pointer">
                                Salvar
                            </button>
                        </div>

                    </div>
                `;
                containerJogos.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // 5. MONTA A TABELA DE RANKING NO HTML
        function renderizarRanking(ranking) {
            if (ranking.length === 0) {
                containerRanking.innerHTML = `<tr><td colspan="3" class="pt-4 text-center text-gray-500 italic">Sem participantes.</td></tr>`;
                return;
            }

            containerRanking.innerHTML = "";
            ranking.forEach((usr, index) => {
                const trHtml = `
                    <tr class="${usr.nome.includes('Carregando') ? '' : usuarioLogadoId && usr.id === usuarioLogadoId ? 'bg-emerald-950/20 text-emerald-300 font-semibold' : ''}">
                        <td class="py-3 text-center text-xs font-mono text-gray-400">${index + 1}º</td>
                        <td class="py-3 pr-2 truncate max-w-[140px]">${usr.nome}</td>
                        <td class="py-3 text-right font-mono font-bold text-amber-400">${usr.pontos_totais}</td>
                    </tr>
                `;
                containerRanking.insertAdjacentHTML('beforeend', trHtml);
            });
        }

        // 6. ADICIONA OU ATUALIZA UM PALPITE NO BANCO (UPSERT)
        async function salvarPalpite(jogoId) {
            const inputA = document.getElementById(`input-a-${jogoId}`);
            const inputB = document.getElementById(`input-b-${jogoId}`);

            const golsA = inputA.value.trim();
            const golsB = inputB.value.trim();

            if (golsA === "" || golsB === "") {
                showToast("Por favor, preencha os dois campos do placar.", true);
                return;
            }

            // O Supabase possui a função .upsert() que insere se não existir, ou atualiza se já existir!
            // Lembra da nossa regra UNIQUE(usuario_id, jogo_id)? Ela garante que o upsert saiba qual linha alterar!
            const { error } = await supabaseClient
                .from('palpites')
                .upsert({
                    usuario_id: usuarioLogadoId,
                    jogo_id: jogoId,
                    palpite_gols_a: parseInt(golsA),
                    palpite_gols_b: parseInt(golsB),
                    atualizado_em: new Date().toISOString()
                }, { onConflict: 'usuario_id,jogo_id' });

            if (error) {
                console.error("Erro ao salvar palpite:", error.message);
                showToast("Falha ao salvar palpite no servidor.", true);
            } else {
                showToast("Palpite registrado com sucesso! 🎉");
            }
        }

        // 7. EVENTO DE LOGOUT
        btnLogout.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        });

        // DISPARO INICIAL
        verificarSessao();
    </script>
</body>
</html>

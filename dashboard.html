<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão 2026 - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="auth-header.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; font-weight: 500; }
        h1,h2,h3 { font-family: 'Quicksand', sans-serif; font-weight: 300; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-6 md:h-24 flex flex-col sm:flex-row justify-between items-center gap-4 fixed top-0 left-0 w-full z-50">
        <div class="w-full sm:w-auto text-center sm:text-left">
            <h1 class="text-xl font-bold tracking-wide text-emerald-400">BOLÃO 2026</h1>
        </div>

        <div class="flex flex-wrap items-center justify-center gap-2 p-1">
            <div class="group relative flex items-center justify-center">
                <button class="bg-emerald-600 text-white text-sm font-medium px-3 py-2 rounded-full transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="material-symbols:dashboard-rounded"></iconify-icon>
                </button>
                <!-- <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Dashboard
                </span> -->
            </div>
            <div class="group relative flex items-center justify-center">
                <button onclick="window.location.href='ranking.html'"  class="cursor-pointer text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-full transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="material-symbols:trophy"></iconify-icon>
                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Ranking
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <button onclick="window.location.href='apostas-grupos.html'" class="cursor-pointer text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-full transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="lucide-lab:soccer-pitch"></iconify-icon>
                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Jogos
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <button onclick="window.location.href='apostas-finais.html'" class="cursor-pointer hover:text-white text-sm font-medium px-3 py-2 rounded-full transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="mdi:bracket"></iconify-icon>
                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Mata-Mata
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <button onclick="window.location.href='palpites.html'" class="cursor-pointer text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-full transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="hugeicons:quiz-02"></iconify-icon>
                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Palpites
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <button onclick="window.location.href='grupos.html'" class="cursor-pointer hover:text-white text-sm font-medium px-3 py-2 rounded-full transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="mynaui:list-number"></iconify-icon>
                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Classificação
                </span>
            </div>
        </div>

        <div class="flex gap-3 items-center">
            <p id="saudacao-user" class="text-xs text-gray-400 mt-1 italic">Carregando...</p>
            <button id="btn-logout" class="bg-gray-700 hover:bg-red-600 text-white text-sm font-medium px-4 py-2 rounded-lg w-full sm:w-auto transition">
                Sair
            </button>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-8 space-y-6 pt-56 md:pt-36">

        <div class="space-y-6">

            <div id="alert-container" class="bg-amber-500/10 border border-amber-500/30 p-5 rounded-xl hidden transition-all">
                <div class="flex items-start gap-4">
                    <div class="p-2 bg-amber-500/20 text-amber-400 rounded-lg flex items-center justify-center">
                        <iconify-icon icon="lucide:calendar-clock" width="24" height="24"></iconify-icon>
                    </div>
                    <div class="space-y-3 flex-1">
                        <div>
                            <h3 class="text-sm font-bold text-amber-400">Apostas Pendentes para Hoje!</h3>
                            <p id="pending-matches-text" class="text-xs text-gray-300 mt-1">Carregando partidas agendadas...</p>
                        </div>
                        <div class="flex gap-2">
                            <a href="apostas-grupos.html" class="inline-flex items-center gap-1.5 px-3 py-2 bg-amber-500 hover:bg-amber-600 text-gray-950 text-xs font-bold rounded-lg transition-colors">
                                Apostar Agora <iconify-icon icon="lucide:arrow-right" width="14"></iconify-icon>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-gray-800 border border-gray-700 p-6 rounded-xl flex items-center justify-between">
                    <div class="space-y-1">
                        <p class="text-xs font-semibold uppercase tracking-wider text-gray-400">Minha Pontuação</p>
                        <h3 id="player-points" class="text-3xl font-black text-emerald-400">-- <span class="text-xs font-normal text-gray-400">pts</span></h3>
                    </div>
                    <div class="text-emerald-500/20">
                        <iconify-icon icon="lucide:star" width="40" height="40"></iconify-icon>
                    </div>
                </div>

                <div class="bg-gray-800 border border-gray-700 p-6 rounded-xl flex items-center justify-between">
                    <div class="space-y-1">
                        <p class="text-xs font-semibold uppercase tracking-wider text-gray-400">Posição no Ranking</p>
                        <h3 id="player-rank" class="text-3xl font-black text-amber-400">#--</h3>
                    </div>
                    <div class="text-amber-500/20">
                        <iconify-icon icon="lucide:award" width="40" height="40"></iconify-icon>
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 border border-gray-700 p-5 rounded-xl space-y-4">
                <div class="flex justify-between items-center border-b border-gray-700 pb-3">
                    <h3 class="text-sm font-bold uppercase tracking-wider text-gray-300 flex items-center gap-2">
                        <iconify-icon icon="lucide:zap" class="text-amber-400"></iconify-icon> Top 5 do Bolão
                    </h3>
                    <a href="ranking.html" class="text-xs text-emerald-400 hover:text-emerald-300 underline font-medium transition">Ver classificação completa</a>
                </div>
                
                <div id="top5-container" class="divide-y divide-gray-700/50">
                    <p class="text-xs text-gray-400 py-4 text-center">Carregando classificação do pódio...</p>
                </div>
            </div>

        </div>

    </main>

    <div id="toast" class="fixed bottom-5 right-5 text-white px-5 py-3 rounded-lg shadow-xl font-medium translate-y-20 opacity-0 transition-all duration-300"></div>
    <script src="dashboard.js"></script>
</body>
</html>

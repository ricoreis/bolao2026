<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão 2026 - Classificação</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 fixed top-0 left-0 w-full z-50">
        <div class="w-full sm:w-auto text-center sm:text-left">
            <h1 class="text-xl font-bold tracking-wide text-emerald-400">BOLÃO 2026</h1>
            <p id="saudacao-user" class="text-xs text-gray-400 mt-1">Carregando perfil...</p>
        </div>

        <div class="flex flex-wrap items-center justify-center gap-2 bg-gray-900/50 p-1 rounded-xl border border-gray-700">
            <div class="hidden group relative flex items-center justify-center">
                <button onclick="window.location.href='dashboard.html'" class="cursor-pointer hover:text-white text-sm font-medium px-3 py-2 rounded-lg transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="material-symbols:dashboard-rounded"></iconify-icon>
                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Dashboard
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <button onclick="window.location.href='ranking.html'"  class="cursor-pointer text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-lg transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="material-symbols:trophy"></iconify-icon>
                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Ranking
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <button onclick="window.location.href='apostas-grupos.html'" class="cursor-pointer text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-lg transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="proicons:soccer"></iconify-icon>
                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Jogos
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <button disabled onclick="window.location.href='apostas-finais.html'" class="opacity-15 cursor-not-allowed hover:text-white text-sm font-medium px-3 py-2 rounded-lg transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="mdi:bracket"></iconify-icon>
                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Mata-Mata
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <button onclick="window.location.href='palpites.html'" class="cursor-pointer text-gray-400 hover:text-white text-sm font-medium px-3 py-2 rounded-lg transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="hugeicons:quiz-02"></iconify-icon>
                </button>
                <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Palpites
                </span>
            </div>
            <div class="group relative flex items-center justify-center">
                <button class="bg-emerald-600 text-white text-sm font-medium px-3 py-2 rounded-lg transition size-12 flex items-center justify-center">
                    <iconify-icon class="text-3xl" icon="mynaui:list-number"></iconify-icon>
                </button>
                <!-- <span class="absolute top-full mt-2 hidden group-hover:block w-max px-2 py-1 bg-gray-900 border border-emerald-600 text-white text-xs rounded-lg z-50">
                    Classificação
                </span> -->
            </div>
        </div>

        <button id="btn-logout" class="bg-gray-700 hover:bg-red-600 text-white text-sm font-medium px-4 py-2 rounded-lg w-full sm:w-auto transition">
            Sair
        </button>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-8 space-y-6 pb-24 pt-28">

        <h2 class="text-2xl uppercase font-semibold text-gray-300 pb-2 text-center">Classificação dos Grupos</h2>

        <div class="space-y-6">

            <div id="box-bonus" class="bg-gray-800 p-4 rounded-xl border border-emerald-500/30 mb-6 space-y-2">
                <div id="lista-bonus" class="text-xs text-gray-300 space-y-1">
                    <p>Calculando bônus...</p>
                </div>
            </div>

            <div id="container-grupos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

            <div class="fixed bottom-0 left-0 w-full px-8 py-4 bg-gray-900 border-t border-gray-700 shadow-[0_-5px_15px_rgba(0,0,0,0.3)] z-50">
                <div class="mx-auto text-right">
                    <button id="btn-salvar-grupos" class="px-8 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition shadow-lg">
                        Salvar
                    </button>
                </div>
            </div>

        </div>

    </main>

    <template id="template-grupo">
        <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">       
            <h4 class="grupo-titulo text-white font-bold mb-3 border-b border-gray-700 pb-2 text-3xl"></h4>
            <div class="grid-inputs grid grid-cols-4 gap-2"></div>
        </div>
    </template>

    <template id="template-input-pais">
        <div class="flex flex-col items-center gap-1">
            <span class="nome-pais text-[9px] text-gray-400 uppercase truncate w-full text-center"></span>
            <input type="number" min="1" max="4" class="grp-input w-full bg-gray-900 border border-gray-700 rounded p-2 text-center text-sm font-bold text-emerald-400">
            <span class="pontos-individuais text-[10px] font-bold text-amber-400 mt-1"></span>
        </div>
    </template>

    <div id="toast" class="fixed top-24 right-5 text-white px-5 py-3 rounded-lg shadow-xl font-medium translate-y-[-20px] opacity-0 transition-all duration-300 z-[60]"></div>
    <script src="grupos.js"></script>
</body>

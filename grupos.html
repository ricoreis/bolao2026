<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão 2026 - Grupos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-xl font-bold tracking-wide text-emerald-400">BOLÃO 2026</h1>
            <p id="saudacao-user" class="text-xs text-gray-400 mt-1">Carregando perfil...</p>
        </div>
        <div class="flex items-center gap-2 bg-gray-900/50 p-1 rounded-xl border border-gray-700">
            <a href="dashboard.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Início</a>
            <a href="apostas-grupos.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Grupos</a>
            <a href="apostas-finais.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Mata-Mata</a>
            <a href="palpites.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Palpites</a>
            <a href="grupos.html" class="bg-emerald-600 text-white text-sm font-medium px-4 py-2 rounded-lg">Classificação</a>
            <a href="ranking.html" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg">Ranking</a>
        </div>
        <button id="btn-logout" class="bg-gray-700 hover:bg-red-600 text-white text-sm font-medium px-4 py-2 rounded-lg w-full sm:w-auto">Sair</button>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-8 space-y-6 pb-24">
        <h2 class="text-2xl uppercase font-semibold text-gray-300 pb-2 text-center">Classificação dos Grupos</h2>
        <div id="box-bonus" class="bg-gray-800 p-4 rounded-xl border border-emerald-500/30 mb-6 space-y-2">
            <div id="lista-bonus" class="text-xs text-gray-300 space-y-1">
                <p>Calculando bônus...</p>
            </div>
        </div>
        <div id="container-grupos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        <div class="fixed bottom-0 left-0 w-full p-4 bg-gray-900 border-t border-gray-700 shadow-[0_-5px_15px_rgba(0,0,0,0.3)] z-40">
            <div class="max-w-3xl mx-auto">
                <button id="btn-salvar-grupos" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition shadow-lg">
                    Salvar Todos os Grupos
                </button>
            </div>
        </div>
    </main>

    <template id="template-grupo">
        <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">       
            <h4 class="grupo-titulo text-white font-bold mb-3 border-b border-gray-700 pb-2"></h4>
            <div class="grid-inputs grid grid-cols-4 gap-2"></div>
        </div>
    </template>

    <template id="template-input-pais">
        <div class="flex flex-col items-center gap-1">
            <span class="nome-pais text-[9px] text-gray-400 uppercase truncate w-full text-center"></span>
            <input type="number" min="1" max="4" class="grp-input w-full bg-gray-900 border border-gray-700 rounded p-2 text-center text-sm font-bold text-emerald-400">
            <span class="pontos-individuais text-[10px] font-bold text-amber-400 mt-1"></span>
        </div>
    </template>

    <div id="toast" class="fixed top-24 right-5 text-white px-5 py-3 rounded-lg shadow-xl font-medium translate-y-[-20px] opacity-0 transition-all duration-300 z-[60]"></div>
    <script src="grupos.js"></script>
</body>
